services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_crypto_finder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    build: ./apps/frontend
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://web:8000
    depends_on:
      - web
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules

  web:
    build: ./apps/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_crypto_finder
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/backend:/app

  worker:
    build: ./apps/backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file: ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_crypto_finder
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/backend:/app

  beat:
    build: ./apps/backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_crypto_finder
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/backend:/app

volumes:
  pgdata:
