version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_crypto_finder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: ./apps/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: ./apps/backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/backend:/app

  worker:
    build: ./apps/backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file: ./apps/backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/backend:/app

  beat:
    build: ./apps/backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: ./apps/backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/backend:/app

volumes:
  pgdata:
