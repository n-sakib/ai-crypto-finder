# ── Telegram Discovery Sources ─────────────────────────────────────────
# Configure groups/channels to monitor for token discovery.
# Only use groups you have authorized access to.
#
# telegram_identifier can be left blank — the system will attempt to
# discover matching groups you're a member of. Fill it in explicitly
# if auto-discovery doesn't find the right group.
#
# Valid telegram_identifier formats:
#   - Public groups: @username
#   - Private groups: -1001234567890 (numeric chat ID)
# ────────────────────────────────────────────────────────────────────────

